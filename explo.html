    <script id="skymapping">
    function renderSkyPositionImage({
        canvas,
        raDeg,
        decDeg,
        targetConstellation,
        constellationsGeoJSON,
        radiusDeg = 45,
        padding = 24,
    }) {
        if (!canvas) {
            throw new Error("renderSkyPositionImage requires a canvas");
        }

        if (!constellationsGeoJSON || !Array.isArray(constellationsGeoJSON.features)) {
            console.error("Bad constellation data:", constellationsGeoJSON);
            throw new Error("constellationsGeoJSON.features is missing or not an array");
        }

        const ctx = canvas.getContext("2d");

        const width = canvas.width;
        const height = canvas.height;

        // Clear only; leave transparent background
        ctx.clearRect(0, 0, width, height);

        const cx = width / 2;
        const cy = height / 2;
        const sphereRadiusPx = Math.max(1, Math.min(width, height) / 2 - padding);

        const ra0 = degToRad(raDeg);
        const dec0 = degToRad(decDeg);
        const cosDec0 = Math.cos(dec0);
        const sinDec0 = Math.sin(dec0);
        const radiusRad = degToRad(radiusDeg);

        function angularDistance(ra1, dec1, ra2, dec2) {
            return Math.acos(
                clamp(
                    Math.sin(dec1) * Math.sin(dec2) +
                    Math.cos(dec1) * Math.cos(dec2) * Math.cos(ra1 - ra2),
                    -1,
                    1
                )
            );
        }

        function project(ra, dec) {
            const dRa = wrapRad(ra - ra0);

            const x = Math.cos(dec) * Math.sin(dRa);
            const y =
                sinDec0 * Math.cos(dec) * Math.cos(dRa) -
                cosDec0 * Math.sin(dec);
            const cosC =
                sinDec0 * Math.sin(dec) +
                cosDec0 * Math.cos(dec) * Math.cos(dRa);

            const dist = angularDistance(ra, dec, ra0, dec0);
            if (cosC <= 0 || dist > radiusRad) return null;

            return {
                x: cx + sphereRadiusPx * x,
                y: cy - sphereRadiusPx * y,
                dist,
            };
        }

        function constellationMatches(featureName, targetName) {
            if (!featureName || !targetName) return false;
            const a = normalizeConstellationName(featureName);
            const b = normalizeConstellationName(targetName);
            return a === b;
        }

        for (const feature of constellationsGeoJSON.features) {
            const featureName = feature?.properties?.name ?? "";
            const isTargetConstellation = constellationMatches(
                featureName,
                targetConstellation
            );

            const lineColor = isTargetConstellation ? "#18b341" : "#999";
            const lineDash = isTargetConstellation ? [] : [4, 3];
            const pointColor = lineColor;

            ctx.save();
            ctx.strokeStyle = lineColor;
            ctx.fillStyle = pointColor;
            ctx.lineWidth = isTargetConstellation ? 2.2 : 1.3;
            ctx.setLineDash(lineDash);

            for (const line of feature.geometry.coordinates) {
                for (let i = 0; i < line.length - 1; i++) {
                    const [ra1Deg, dec1Deg] = line[i];
                    const [ra2Deg, dec2Deg] = line[i + 1];

                    const ra1 = degToRad(ra1Deg);
                    const dec1 = degToRad(dec1Deg);
                    const ra2 = degToRad(ra2Deg);
                    const dec2 = degToRad(dec2Deg);

                    const p1 = project(ra1, dec1);
                    const p2 = project(ra2, dec2);

                    const d1 = angularDistance(ra1, dec1, ra0, dec0);
                    const d2 = angularDistance(ra2, dec2, ra0, dec0);

                    if ((d1 <= radiusRad || d2 <= radiusRad) && p1 && p2) {
                        ctx.beginPath();
                        ctx.moveTo(p1.x, p1.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }

                    if (p1 && d1 <= radiusRad) {
                        drawCircle(ctx, p1.x, p1.y, isTargetConstellation ? 3.2 : 2.5, pointColor);
                    }
                    if (i === line.length - 2 && p2 && d2 <= radiusRad) {
                        drawCircle(ctx, p2.x, p2.y, isTargetConstellation ? 3.2 : 2.5, pointColor);
                    }
                }
            }

            ctx.restore();
        }

        drawCircle(ctx, cx, cy, 13, "red");

        return canvas;
    }

    function degToRad(d) {
        return (d * Math.PI) / 180;
    }

    function clamp(x, min, max) {
        return Math.max(min, Math.min(max, x));
    }

    function wrapRad(x) {
        while (x <= -Math.PI) x += 2 * Math.PI;
        while (x > Math.PI) x -= 2 * Math.PI;
        return x;
    }

    function drawCircle(ctx, x, y, r, fill) {
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fillStyle = fill;
        ctx.fill();
    }

    function normalizeConstellationName(name) {
        const map = {
            ophiucus: "ophiuchus",
            ophiuchus: "ophiuchus",
            herculis: "hercules",
            hercules: "hercules",
            centauris: "centaurus",
            centaurus: "centaurus",
        };

        const key = String(name).trim().toLowerCase();
        return map[key] || key;
    }

        async function main() {
                const params = new URLSearchParams(window.location.search);

                const raDeg = ra;
                const decDeg = dec;
                const targetConstellation = constellation;

                const response = await fetch("./all_major_constellations.json");
                const constellations = await response.json();

                const skyCanvas = document.getElementById("sky");
                const rect = skyCanvas.getBoundingClientRect();
                skyCanvas.width = Math.round(rect.width);
                skyCanvas.height = Math.round(rect.height);

                renderSkyPositionImage({
                    canvas: skyCanvas,
                    raDeg,
                    decDeg,
                    targetConstellation,
                    constellationsGeoJSON: constellations,
                    radiusDeg: 45,
                    padding: 24,
                });
            }

            main();

    </script>
